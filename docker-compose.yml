services:
  postgres:
    image: postgres:18.3
    pull_policy: never
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-false}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_RESTRICT_FILE_ACCESS_TO: /files;/home/node/.n8n-files
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Jakarta}
      TZ: ${TZ:-Asia/Jakarta}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CAPTION_MODEL: ${OPENAI_CAPTION_MODEL:-gpt-5.4-mini}
      OPENAI_CAPTION_LANGUAGE: ${OPENAI_CAPTION_LANGUAGE:-id}
      OPENAI_CAPTION_BRAND_VOICE: ${OPENAI_CAPTION_BRAND_VOICE:-ringkas, tajam, natural, tidak clickbait murahan}
      OPENAI_CAPTION_MAX_HASHTAGS: ${OPENAI_CAPTION_MAX_HASHTAGS:-8}
    volumes:
      - ./n8n:/home/node/.n8n
      - ./shared:/files

volumes:
  postgres_data:
